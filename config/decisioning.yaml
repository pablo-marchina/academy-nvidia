version: 1
generated_for: "NVIDIA Startup AI Radar"

priors:
  evidence_positive_alpha: 2.0
  evidence_negative_beta: 2.0
  recommendation_success_alpha: 2.0
  recommendation_failure_beta: 2.0
  source_reliability_alpha: 3.0
  source_reliability_beta: 2.0

thresholds:
  min_evidence_coverage: 0.80
  min_source_diversity: 3
  min_classification_confidence: 0.62
  max_decision_uncertainty: 0.38
  min_rag_contexts_per_recommendation: 1
  min_nvidia_citation_coverage: 1.0
  low_evidence_review_trigger: 0.50
  expected_utility_publish_threshold: 0.55

exploration:
  strategy: "bayesian_update_with_expected_information_gain"
  max_source_cost_budget: 1.0
  min_marginal_information_gain: 0.03
  thompson_sampling_enabled: true
  exploration_probability_floor: 0.05
  exploration_probability_ceiling: 0.25

feedback:
  posterior_update: "beta_binomial"
  default_learning_rate: 0.20
  min_feedback_sample_size_for_auto_promotion: 10
  manual_review_required_below_confidence: 0.60

runtime_gates:
  require_decision_ledger: true
  require_probabilities: true
  require_uncertainty: true
  require_alternatives_considered: true
  require_rag_for_nvidia_recommendations: true
