    result: Production readiness scoring
    sensitivity: medium
    allowed_range: "real_users: [0.25-0.35], scale_inference: [0.25-0.35]"
    decision: CALIBRATED
    owner: project-team
    calibration_date: "2026-06-01"
    status: CALIBRATED

  - name: ai_native_keyword_boosts
    path: src/quantitative/params.py
