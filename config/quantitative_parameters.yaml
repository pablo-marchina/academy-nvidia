  - name: discovery_rate_limit
    path: src/quantitative/params.py
    value: "{requests_per_second: 2, concurrent_requests: 1}"
    unit: requests/sec
    objective: Rate limiting for polite crawling
    hypothesis: 2 req/s with 1 concurrent is conservative
