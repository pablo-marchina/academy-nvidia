  - name: confidence_penalty_on_missing
    path: src/quantitative/params.py
    value: "0.15"
    unit: float (penalty)
    objective: Penalize composite score when data is missing
    hypothesis: 15% penalty is noticeable but not crippling
    source: Heuristic
    dataset: golden_startup_scoring_baseline.json
    metric_optimized: score_robustness
    baseline: 0.0 (no penalty)
    result: Missing data penalized by 15%
    sensitivity: medium
    allowed_range: "[0.1-0.25]"
    decision: CALIBRATED
    owner: project-team
    calibration_date: "2026-06-01"
    status: CALIBRATED

  - name: no_evidence_factor
    path: src/quantitative/params.py
    value: "0.3"
    unit: float (multiplier)
    objective: Reduce inception fit when no evidence is available
    hypothesis: 30% of base score when evidence is missing
    source: Heuristic
    dataset: golden_startup_scoring_baseline.json
    metric_optimized: score_calibration
    baseline: 0.5
    result: Evidence gaps reduce score to 30%
    sensitivity: medium
    allowed_range: "[0.2-0.5]"
