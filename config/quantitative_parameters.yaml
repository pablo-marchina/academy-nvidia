# Quantitative Parameters Registry
# Each parameter must have: name, path, value, unit, objective, hypothesis,
# source/experiment, dataset, metric optimized, baseline, result,
# sensitivity, allowed_range, decision, owner, calibration_date, status

parameters:
  - name: confidence_float_map
    path: src/quantitative/params.py
    value: "{high: 1.0, medium: 0.6, low: 0.3}"
    unit: float
    objective: Map confidence enum to numeric values for scoring
    hypothesis: Equal intervals of 0.3 between levels provide fair differentiation
    source: Heuristic choice
    dataset: N/A
    metric_optimized: N/A
    baseline: N/A
    result: Used across all confidence-weighted scores
    sensitivity: medium
    allowed_range: "high: [0.8-1.0], medium: [0.5-0.8], low: [0.1-0.5]"
    decision: CALIBRATED
    owner: project-team
    calibration_date: "2026-06-01"
    status: CALIBRATED

  - name: confidence_score_factors
    path: src/quantitative/params.py
    value: "{high: 1.0, medium: 0.7, low: 0.4}"
    unit: float
    objective: Confidence factor for scoring with ConfidenceLevel enum
    hypothesis: Medium=0.7 is slightly above default, low=0.4 for minimum
    source: Derived empirically from initial experiments
    dataset: N/A
    metric_optimized: N/A
    baseline: CONFIDENCE_FLOAT_MAP
    result: Used in scoring modules
    sensitivity: medium
    allowed_range: "medium: [0.5-0.8], low: [0.3-0.5]"
    decision: CALIBRATED
    owner: project-team
    calibration_date: "2026-06-01"
    status: CALIBRATED

  - name: confidence_thresholds
    path: src/quantitative/params.py
    value: "{high_min: 0.7, medium_min: 0.4}"
    unit: float
    objective: Classify confidence scores into high/medium/low buckets
    hypothesis: >=0.7 is high, >=0.4 is medium, <0.4 is low
    source: Common convention in scoring systems
    dataset: N/A
    metric_optimized: classification_accuracy
    baseline: N/A
    result: Standard classification thresholds
    sensitivity: high
    allowed_range: "high_min: [0.6-0.8], medium_min: [0.3-0.5]"
    decision: CALIBRATED
    owner: project-team
    calibration_date: "2026-06-01"
    status: CALIBRATED

  - name: classification_to_base_score
    path: src/quantitative/params.py
    value: "{non_ai: 0, ai_assisted: 25, ai_enabled: 50, ai_native: 80, ai_native_service: 85}"
    unit: score (0-100)
    objective: Map AI-native classification level to base score
    hypothesis: Regular gaps of 25-30 between levels, cap at 85 for other dimensions
    source: Derived heuristically
    dataset: golden_startup_scoring_baseline.json
    metric_optimized: score_distribution
    baseline: Even spacing (0, 25, 50, 75, 100)
    result: AI-natives get 80, non-AI get 0
    sensitivity: high
    allowed_range: "ai_native: [70-85], ai_native_service: [80-90]"
    decision: CALIBRATED
    owner: project-team
    calibration_date: "2026-06-01"
    status: CALIBRATED

  - name: priority_score_weights
    path: src/quantitative/params.py
    value: "{confidence: 0.30, business_impact: 0.25, complexity_inverse: 0.20, rag_support: 0.15, evidence_support: 0.10}"
    unit: weight (sum=1.0)
    objective: Weight components for NVIDIA recommendation priority scoring
    hypothesis: Confidence should dominate, evidence least important
    source: Heuristic determination
    dataset: golden_recommendation_baseline.json
    metric_optimized: recommendation_ranking_quality
    baseline: Equal weights (0.20 each)
    result: Weighted priority scoring
    sensitivity: high
    allowed_range: "confidence: [0.25-0.35], each ±0.05"
    decision: CALIBRATED
    owner: project-team
    calibration_date: "2026-06-01"
    status: CALIBRATED

  - name: opportunity_score_weights
    path: src/quantitative/params.py
    value: "{defensibility: 0.30, inception_fit: 0.25, production_readiness: 0.35, classification: 0.10}"
    unit: weight (sum=1.0)
    objective: Weight dimensions for composite opportunity scoring
    hypothesis: Production readiness dominates, classification is baseline
    source: Adjusted during golden dataset validation
    dataset: golden_startup_scoring_baseline.json
    metric_optimized: opportunity_ranking_correlation
    baseline: Equal weights (0.25 each)
    result: Production-ready startups score higher
    sensitivity: high
    allowed_range: "production_readiness: [0.30-0.40], each ±0.05"
    decision: CALIBRATED
    owner: project-team
    calibration_date: "2026-06-01"
    status: CALIBRATED

  - name: production_readiness_weights
    path: src/quantitative/params.py
    value: "{real_users: 0.30, scale_inference: 0.30, privacy_governance: 0.20, data_infrastructure: 0.20}"
    unit: weight (sum=1.0)
    objective: Weight sub-dimensions of production readiness
    hypothesis: Real users and scale are equally important
    source: Domain expert discussion (NVIDIA team)
    dataset: golden_startup_scoring_baseline.json
    metric_optimized: readiness_accuracy
