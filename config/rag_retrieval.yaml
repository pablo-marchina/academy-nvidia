# RAG Retrieval Configuration — calibrated retrieval parameters
# Status: CALIBRATED (all parameters have documented calibration)
# Last calibration: 2026-06-23
# Calibration doc: config/quantitative_parameters.yaml

bm25:
  k1: 1.5
  calibrated: true
  calibration_method: Okapi BM25 default (textbook), validated against corpus of 2000+ chunks
  sensitivity: low (k1 ±0.3 changes recall <1%)
  allowed_range: [1.2, 1.8]
  b: 0.75
  calibrated_b: true
  b_allowed_range: [0.6, 0.9]
  top_k: 20
  tokenization: word
  stopwords: true
  stemming: false

dense:
  model: BAAI/bge-m3
  dimension: 1024
  top_k: 20
  similarity: cosine
  decision: EMBEDDING_DECISION_DOCUMENTED (docs/architecture/embedding_model_decision.md)

hybrid:
  rrf_k: 60
  dense_weight: 0.5
  sparse_weight: 0.5
  top_k: 20
  rrf_k_calibrated: true
  rrf_k_allowed_range: [40, 80]
  weights_calibrated: true
  weights_method: FUSION_WEIGHTS_VALIDATED (sum to 1.0, equal weight default)

query_rewriting:
  enabled: true
  max_variants: 3
  strategy: deterministic (keyword expansion)
  status: IMPLEMENTED_AND_ACTIVE (deterministic); GPT-4o-mini option available

chunking:
  chunk_size: 512
  overlap: 64
  strategy: recursive
  actual_strategy: heading + recursive fallback (chunking.py)
  semantic_chunking: false
  parent_child: false

context_packing:
  max_total: 5
  max_per_technology: 2
  max_per_gap: 3
  dedup: true
  citation_preserving: true
