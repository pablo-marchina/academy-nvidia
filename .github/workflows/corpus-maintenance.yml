name: Corpus Maintenance

on:
  workflow_dispatch:
    inputs:
      run_sync:
        description: "Run source sync dry-run"
        required: true
        type: boolean
        default: true
      run_ingestion:
        description: "Run real Qdrant ingestion"
        required: true
        type: boolean
        default: false
      run_evals:
        description: "Run RAG and golden evals"
        required: true
        type: boolean
        default: true
      promote_sources:
        description: "Promote synced sources to local corpus"
        required: true
        type: boolean
        default: false
      recreate_collection:
        description: "Recreate Qdrant collection during real ingestion"
        required: true
        type: boolean
        default: false
      fail_on_stale:
        description: "Fail freshness audit on stale sources"
        required: true
        type: boolean
        default: false
      fail_on_expired:
        description: "Fail freshness audit on expired sources"
        required: true
        type: boolean
        default: true
  schedule:
    - cron: "0 9 * * 1"

env:
  PYTHON_VERSION: "3.11"
  REPORTS_DIR: reports/corpus-maintenance/github-${{ github.run_id }}

jobs:
  corpus-maintenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,rag]"

      - name: Start local Qdrant when real ingestion is enabled
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.run_ingestion == true || inputs.run_ingestion == 'true') }}
        run: docker compose up -d qdrant

      - name: Run corpus maintenance
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            python scripts/run_corpus_maintenance.py \
              --run-sync \
              --no-run-ingestion \
              --run-evals \
              --no-promote-sources \
              --no-recreate-collection \
              --no-fail-on-stale \
              --fail-on-expired \
              --reports-dir "${REPORTS_DIR}"
          else
            args=()
            if [ "${{ inputs.run_sync }}" = "true" ]; then args+=(--run-sync); else args+=(--no-run-sync); fi
            if [ "${{ inputs.run_ingestion }}" = "true" ]; then args+=(--run-ingestion); else args+=(--no-run-ingestion); fi
            if [ "${{ inputs.run_evals }}" = "true" ]; then args+=(--run-evals); else args+=(--no-run-evals); fi
            if [ "${{ inputs.promote_sources }}" = "true" ]; then args+=(--promote-sources); else args+=(--no-promote-sources); fi
            if [ "${{ inputs.recreate_collection }}" = "true" ]; then args+=(--recreate-collection); else args+=(--no-recreate-collection); fi
            if [ "${{ inputs.fail_on_stale }}" = "true" ]; then args+=(--fail-on-stale); else args+=(--no-fail-on-stale); fi
            if [ "${{ inputs.fail_on_expired }}" = "true" ]; then args+=(--fail-on-expired); else args+=(--no-fail-on-expired); fi
            python scripts/run_corpus_maintenance.py "${args[@]}" --reports-dir "${REPORTS_DIR}"
          fi

      - name: Stop local Qdrant
        if: ${{ always() && github.event_name == 'workflow_dispatch' && (inputs.run_ingestion == true || inputs.run_ingestion == 'true') }}
        run: docker compose down

      - name: Build regression dashboard
        if: always()
        run: python scripts/build_regression_dashboard.py --reports-dir "${REPORTS_DIR}" --no-fail-on-status

      - name: Write regression dashboard to job summary
        if: always()
        run: |
          if [ -f data/regression_reports/latest_dashboard.md ]; then
            cat data/regression_reports/latest_dashboard.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Regression dashboard was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          import pathlib

          path = pathlib.Path("data/regression_reports/latest_dashboard.json")
          if path.is_file():
              data = json.loads(path.read_text(encoding="utf-8"))
              metrics = data.get("metrics", {})
              print("")
              print("## Answer Quality JUnit")
              print(f"- Present: `{metrics.get('answer_quality_junit_present')}`")
              print(f"- Status: `{metrics.get('answer_quality_status')}`")
              print(f"- Tests: `{metrics.get('answer_quality_tests')}`")
              print(f"- Failures: `{metrics.get('answer_quality_failures')}`")
              print(f"- Errors: `{metrics.get('answer_quality_errors')}`")
              print(f"- Skipped: `{metrics.get('answer_quality_skipped')}`")
          PY

      - name: Upload corpus maintenance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: corpus-maintenance-reports
          path: |
            ${{ env.REPORTS_DIR }}
            ${{ env.REPORTS_DIR }}/answer_quality_eval_junit.xml
            data/regression_reports/latest_dashboard.md
            data/regression_reports/latest_dashboard.json
          if-no-files-found: warn

      - name: Fail on regression dashboard FAIL status
        if: always()
        run: |
          python - <<'PY'
          import json
          import pathlib
          import sys

          path = pathlib.Path("data/regression_reports/latest_dashboard.json")
          data = json.loads(path.read_text(encoding="utf-8")) if path.is_file() else {"status": "FAIL"}
          status = data.get("status")
          print(f"Regression dashboard status: {status}")
          for failure in data.get("failures", []):
              print(f"Failure: {failure}")
          for label, cases in data.get("failed_cases", {}).items():
              for case in cases:
                  print(f"Failed case ({label}): {case}")
          for label, details in data.get("failure_details", {}).items():
              for detail in details[:10]:
                  print(f"Failure detail ({label}): {detail}")
          sys.exit(1 if status == "FAIL" else 0)
          PY
