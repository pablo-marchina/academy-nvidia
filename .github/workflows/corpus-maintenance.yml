name: Corpus Maintenance

on:
  workflow_dispatch:
    inputs:
      run_sync:
        description: "Run source sync dry-run"
        required: true
        type: boolean
        default: true
      run_ingestion:
        description: "Run real Qdrant ingestion"
        required: true
        type: boolean
        default: false
      run_evals:
        description: "Run RAG and golden evals"
        required: true
        type: boolean
        default: true
      promote_sources:
        description: "Promote synced sources to local corpus"
        required: true
        type: boolean
        default: false
      recreate_collection:
        description: "Recreate Qdrant collection during real ingestion"
        required: true
        type: boolean
        default: false
      fail_on_stale:
        description: "Fail freshness audit on stale sources"
        required: true
        type: boolean
        default: false
      fail_on_expired:
        description: "Fail freshness audit on expired sources"
        required: true
        type: boolean
        default: true
  schedule:
    - cron: "0 9 * * 1"

env:
  PYTHON_VERSION: "3.11"
  REPORTS_DIR: reports/corpus-maintenance/github-${{ github.run_id }}

jobs:
  corpus-maintenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,rag]"

      - name: Start local Qdrant when real ingestion is enabled
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_ingestion }}
        run: docker compose up -d qdrant

      - name: Run corpus maintenance
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            python scripts/run_corpus_maintenance.py \
              --run-sync \
              --no-run-ingestion \
              --run-evals \
              --no-promote-sources \
              --no-recreate-collection \
              --no-fail-on-stale \
              --fail-on-expired \
              --reports-dir "${REPORTS_DIR}"
          else
            python scripts/run_corpus_maintenance.py \
              ${{ inputs.run_sync && '--run-sync' || '--no-run-sync' }} \
              ${{ inputs.run_ingestion && '--run-ingestion' || '--no-run-ingestion' }} \
              ${{ inputs.run_evals && '--run-evals' || '--no-run-evals' }} \
              ${{ inputs.promote_sources && '--promote-sources' || '--no-promote-sources' }} \
              ${{ inputs.recreate_collection && '--recreate-collection' || '--no-recreate-collection' }} \
              ${{ inputs.fail_on_stale && '--fail-on-stale' || '--no-fail-on-stale' }} \
              ${{ inputs.fail_on_expired && '--fail-on-expired' || '--no-fail-on-expired' }} \
              --reports-dir "${REPORTS_DIR}"
          fi

      - name: Stop local Qdrant
        if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.run_ingestion }}
        run: docker compose down

      - name: Upload corpus maintenance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: corpus-maintenance-reports
          path: ${{ env.REPORTS_DIR }}
          if-no-files-found: warn
