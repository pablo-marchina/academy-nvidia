name: Corpus Maintenance

on:
  workflow_dispatch:
    inputs:
      run_sync:
        description: "Run source sync dry-run"
        required: true
        type: boolean
        default: true
      run_ingestion:
        description: "Run real Qdrant ingestion"
        required: true
        type: boolean
        default: false
      run_evals:
        description: "Run RAG and golden evals"
        required: true
        type: boolean
        default: true
      promote_sources:
        description: "Promote synced sources to local corpus"
        required: true
        type: boolean
        default: false
      recreate_collection:
        description: "Recreate Qdrant collection during real ingestion"
        required: true
        type: boolean
        default: false
      fail_on_stale:
        description: "Fail freshness audit on stale sources"
        required: true
        type: boolean
        default: false
      fail_on_expired:
        description: "Fail freshness audit on expired sources"
        required: true
        type: boolean
        default: true
  schedule:
    - cron: "0 9 * * 1"

env:
  PYTHON_VERSION: "3.11"
  REPORTS_DIR: reports/corpus-maintenance/github-${{ github.run_id }}

jobs:
  corpus-maintenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,rag]"

      - name: Start local Qdrant when real ingestion is enabled
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.run_ingestion == true || inputs.run_ingestion == 'true') }}
        run: docker compose up -d qdrant

      - name: Run corpus maintenance
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            python scripts/run_corpus_maintenance.py \
              --run-sync \
              --no-run-ingestion \
              --run-evals \
              --no-promote-sources \
              --no-recreate-collection \
              --no-fail-on-stale \
              --fail-on-expired \
              --reports-dir "${REPORTS_DIR}"
          else
            args=()
            if [ "${{ inputs.run_sync }}" = "true" ]; then args+=(--run-sync); else args+=(--no-run-sync); fi
            if [ "${{ inputs.run_ingestion }}" = "true" ]; then args+=(--run-ingestion); else args+=(--no-run-ingestion); fi
            if [ "${{ inputs.run_evals }}" = "true" ]; then args+=(--run-evals); else args+=(--no-run-evals); fi
            if [ "${{ inputs.promote_sources }}" = "true" ]; then args+=(--promote-sources); else args+=(--no-promote-sources); fi
            if [ "${{ inputs.recreate_collection }}" = "true" ]; then args+=(--recreate-collection); else args+=(--no-recreate-collection); fi
            if [ "${{ inputs.fail_on_stale }}" = "true" ]; then args+=(--fail-on-stale); else args+=(--no-fail-on-stale); fi
            if [ "${{ inputs.fail_on_expired }}" = "true" ]; then args+=(--fail-on-expired); else args+=(--no-fail-on-expired); fi
            python scripts/run_corpus_maintenance.py "${args[@]}" --reports-dir "${REPORTS_DIR}"
          fi

      - name: Stop local Qdrant
        if: ${{ always() && github.event_name == 'workflow_dispatch' && (inputs.run_ingestion == true || inputs.run_ingestion == 'true') }}
        run: docker compose down

      - name: Upload corpus maintenance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: corpus-maintenance-reports
          path: ${{ env.REPORTS_DIR }}
          if-no-files-found: warn
