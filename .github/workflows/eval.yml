name: Offline Evaluation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # every Monday 06:00 UTC
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.14"

jobs:
  eval:
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:v1.12.1
        ports:
          - 6333:6333
      postgres:
        image: postgres:16.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: startup_radar
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,rag,eval,ragas-eval,observability]"

      - name: Run evaluation suites
        env:
          APP_MODE: product
          QDRANT_URL: http://localhost:6333
          QDRANT_COLLECTION: nvidia_corpus
          PRODUCT_DB_URL: postgresql://postgres:postgres@localhost:5432/startup_radar
          RAG_EMBEDDING_MODEL: BAAI/bge-m3
          QDRANT_VECTOR_SIZE: "1024"
        run: |
          python -m src.evaluation.eval_runner --ci

      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: data/eval_results/
