version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: startup-radar-postgres
    environment:
      POSTGRES_DB: startup_radar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: startup-radar-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # redis:
  #   image: redis:7
  #   container_name: startup-radar-redis
  #   ports:
  #     - "6379:6379"

volumes:
  postgres_data:
  qdrant_data:
