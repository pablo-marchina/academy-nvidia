services:
  postgres:
    image: postgres:16.4
    container_name: startup-radar-postgres
    environment:
      POSTGRES_DB: startup_radar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - startup-radar-net

  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: startup-radar-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - startup-radar-net

volumes:
  postgres_data:
  qdrant_data:

networks:
  startup-radar-net:
    driver: bridge
