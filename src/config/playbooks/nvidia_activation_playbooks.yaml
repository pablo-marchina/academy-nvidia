  - playbook_id: private_controlled_deployment
    name: Private & Controlled Deployment
    description: Implementar deploy controlado de workloads de IA com NVIDIA AI Enterprise e NIM
    target_gap_types:
      - privacy_or_controlled_deployment
    target_claim_types:
      - gap_claim
      - nvidia_fit_claim
    nvidia_technologies:
      - NVIDIA AI Enterprise
      - NVIDIA NIM
    technical_experiment:
      title: Controlled AI Deployment Pilot
      hypothesis: Deploying the AI workload using NVIDIA NIM on-premise meets governance requirements while maintaining inference performance within 10% of cloud baseline
      description: Set up a controlled deployment of the AI service using NIM microservices on-premise or in a VPC, measure governance coverage and performance
      duration: 4-8 weeks
    success_metrics:
      - deployment time (days)
      - governance coverage (%)
      - operational risk reduction (%)
      - inference performance delta (% vs cloud)
    recommended_motion: technical_workshop
    prerequisites:
      - NVIDIA AI Enterprise license (NVIDIA AI Enterprise)
      - On-premise or VPC infrastructure with NVIDIA GPUs
      - Compliance requirements documentation (LGPD, HIPAA, SOC2)
    evidence_requirements:
      - Evidence of data residency or controlled deployment requirements
      - Evidence of regulatory compliance needs
    risks:
      - On-premise deployment requires infrastructure investment
      - NIM microservices may require container orchestration (Kubernetes)
      - Performance may vary compared to cloud deployment
    expected_value: Controlled deployment with full governance coverage
    implementation_complexity: high
    confidence_rules:
      requires_gap_match: true
      evidence_coverage_boost: true
      unsupported_claim_penalty: true
      min_evidence_coverage: 0.3
    output_template:
